name: Deploy to Railway

on:
  push:
    branches:
      - staging
      - production

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run tests
        run: npm test

  deploy-staging:
    needs: test
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Diagnostic - Check Token
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "❌ ERROR: RAILWAY_TOKEN is not being injected into this job."
            exit 1
          else
            echo "✅ RAILWAY_TOKEN is present (length: ${#RAILWAY_TOKEN})"
          fi
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy to Staging
        # Project Tokens already contain environment and project info. 
        # We specify service ID to be absolutely certain.
        run: railway up --service ff25070e-e565-4f3c-860a-5ccd71ef8d0b --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-production:
    needs: test
    if: github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Diagnostic - Check Token
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "❌ ERROR: RAILWAY_TOKEN is not being injected into this job."
            exit 1
          else
            echo "✅ RAILWAY_TOKEN is present (length: ${#RAILWAY_TOKEN})"
          fi
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy to Production
        run: railway up --service ff25070e-e565-4f3c-860a-5ccd71ef8d0b --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
